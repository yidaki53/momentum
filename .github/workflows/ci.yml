name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --with dev

      - name: Build Cython extensions
        run: |
          poetry run pip install --upgrade setuptools wheel
          poetry run python setup.py build_ext --inplace

      - name: Lint
        run: poetry run ruff check momentum/ tests/

      - name: Test with coverage
        env:
          MPLBACKEND: Agg
        run: poetry run pytest tests/ --cov=momentum --cov-report=term-missing --cov-fail-under=70 -q

  build:
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: momentum-linux
            separator: ":"
          - os: macos-latest
            artifact: momentum-macos
            separator: ":"
          - os: windows-latest
            artifact: momentum-windows
            separator: ";"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --with dev

      - name: Build Cython extensions
        run: |
          poetry run pip install --upgrade setuptools wheel
          poetry run python setup.py build_ext --inplace

      - name: Build standalone binary
        shell: bash
        run: |
          poetry run pyinstaller \
            --onefile \
            --name momentum \
            --add-data "ENCOURAGEMENTS.md${{ matrix.separator }}." \
            --add-data "IMAGES.md${{ matrix.separator }}." \
            --hidden-import momentum \
            --hidden-import PIL._tkinter_finder \
            --clean \
            momentum/cli.py

      - name: Verify binary runs
        shell: bash
        run: |
          if [ -f dist/momentum.exe ]; then
            dist/momentum.exe --help
          else
            dist/momentum --help
          fi

      - name: Build .deb package (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev
          sudo gem install fpm

          VERSION=$(pip install poetry > /dev/null 2>&1; poetry version -s)

          # Create staging directory
          mkdir -p deb-staging/usr/local/bin
          mkdir -p deb-staging/usr/local/share/momentum
          mkdir -p deb-staging/usr/share/applications

          cp dist/momentum deb-staging/usr/local/bin/momentum
          chmod 755 deb-staging/usr/local/bin/momentum
          cp ENCOURAGEMENTS.md deb-staging/usr/local/share/momentum/
          cp IMAGES.md deb-staging/usr/local/share/momentum/

          cat > deb-staging/usr/share/applications/momentum.desktop <<EOF
          [Desktop Entry]
          Name=Momentum
          Comment=A gentle tool for executive dysfunction support
          Exec=/usr/local/bin/momentum gui
          Type=Application
          Categories=Utility;
          Terminal=false
          EOF
          # Strip leading whitespace from heredoc
          sed -i 's/^          //' deb-staging/usr/share/applications/momentum.desktop

          fpm -s dir -t deb \
            -n momentum \
            -v "$VERSION" \
            --description "A gentle CLI and GUI tool to help people with executive dysfunction get back on track" \
            --maintainer "Robin Öberg <robinoberg@live.com>" \
            --url "https://github.com/yidaki53/momentum" \
            --license MIT \
            --depends python3-tk \
            -C deb-staging \
            -p "momentum_${VERSION}_amd64.deb" \
            .

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p artifacts
          if [ -f dist/momentum.exe ]; then
            cp dist/momentum.exe "artifacts/${{ matrix.artifact }}.exe"
          else
            cp dist/momentum "artifacts/${{ matrix.artifact }}"
          fi
          # Include .deb if it was built
          if ls momentum_*.deb 1>/dev/null 2>&1; then
            cp momentum_*.deb artifacts/
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifacts/

  build-apk:
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev libssl-dev \
            autoconf automake libtool libltdl-dev pkg-config zlib1g-dev \
            unzip zip

      - name: Install buildozer and Cython
        run: |
          pip install buildozer cython==0.29.36

      - name: Create mobile symlinks
        run: |
          cd mobile
          ln -sfn ../momentum momentum
          ln -sfn ../ENCOURAGEMENTS.md ENCOURAGEMENTS.md
          ln -sfn ../SCIENCE.md SCIENCE.md
          ln -sfn ../README.md README.md
          ln -sfn ../IMAGES.md IMAGES.md

      - name: Prepare Android signing keystore
        env:
          ANDROID_RELEASE_KEYSTORE_B64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_B64 }}
        run: |
          set -euo pipefail
          if [ -z "${ANDROID_RELEASE_KEYSTORE_B64}" ]; then
            echo "Missing required secret: ANDROID_RELEASE_KEYSTORE_B64" >&2
            exit 1
          fi
          mkdir -p mobile/.ci

          # Decode robustly: tolerate wrapped/urlsafe/missing-padding base64 while
          # still validating content before writing the keystore.
          export ANDROID_RELEASE_KEYSTORE_B64
          python -c "import base64,os,re; raw=os.environ.get('ANDROID_RELEASE_KEYSTORE_B64',''); clean=re.sub(r'\\s+','',raw).replace('-','+').replace('_','/'); clean += '='*((4-len(clean)%4)%4); open('mobile/.ci/release.keystore','wb').write(base64.b64decode(clean, validate=True))" || {
            echo "ANDROID_RELEASE_KEYSTORE_B64 is not valid base64 after normalization." >&2
            exit 1
          }

          if [ ! -s mobile/.ci/release.keystore ]; then
            echo "Decoded Android keystore is empty or unreadable" >&2
            exit 1
          fi

      - name: Validate Android signing configuration
        env:
          P4A_RELEASE_KEYSTORE: ${{ github.workspace }}/mobile/.ci/release.keystore
          P4A_RELEASE_KEYSTORE_PASSWD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWD }}
          P4A_RELEASE_KEYALIAS: ${{ secrets.ANDROID_RELEASE_KEYALIAS }}
          P4A_RELEASE_KEYALIAS_PASSWD: ${{ secrets.ANDROID_RELEASE_KEYALIAS_PASSWD }}
        run: |
          set -euo pipefail
          if [ -z "${P4A_RELEASE_KEYSTORE_PASSWD}" ] || [ -z "${P4A_RELEASE_KEYALIAS}" ] || [ -z "${P4A_RELEASE_KEYALIAS_PASSWD}" ]; then
            echo "Missing required Android signing secrets: ANDROID_RELEASE_KEYSTORE_PASSWD, ANDROID_RELEASE_KEYALIAS, ANDROID_RELEASE_KEYALIAS_PASSWD" >&2
            exit 1
          fi

          # Step 1: verify the keystore opens with the store password
          if ! keytool -list \
            -keystore "${P4A_RELEASE_KEYSTORE}" \
            -storepass "${P4A_RELEASE_KEYSTORE_PASSWD}" \
            >/tmp/android-signing-check.log 2>&1; then
            echo "Android signing preflight failed: cannot open keystore with ANDROID_RELEASE_KEYSTORE_PASSWD." >&2
            cat /tmp/android-signing-check.log >&2
            exit 1
          fi

          # Step 2: verify the alias exists in the keystore
          if ! grep -q "${P4A_RELEASE_KEYALIAS}" /tmp/android-signing-check.log; then
            echo "Android signing preflight failed: alias '${P4A_RELEASE_KEYALIAS}' not found in keystore. Check ANDROID_RELEASE_KEYALIAS." >&2
            cat /tmp/android-signing-check.log >&2
            exit 1
          fi

          # Step 3: verify the key entry password by performing an actual private-key
          # export (keytool -list silently ignores -keypass and cannot catch a bad key
          # entry password -- only operations that decrypt the private key can).
          if ! keytool -importkeystore \
            -srckeystore "${P4A_RELEASE_KEYSTORE}" \
            -srcstorepass "${P4A_RELEASE_KEYSTORE_PASSWD}" \
            -srcalias "${P4A_RELEASE_KEYALIAS}" \
            -srckeypass "${P4A_RELEASE_KEYALIAS_PASSWD}" \
            -destkeystore /tmp/android-signing-verify.p12 \
            -deststorepass "ci_verify_tmp" \
            -destkeypass "ci_verify_tmp" \
            -deststoretype pkcs12 \
            -noprompt \
            >/tmp/android-keypass-check.log 2>&1; then
            echo "Android signing preflight failed: cannot decrypt key entry with ANDROID_RELEASE_KEYALIAS_PASSWD." >&2
            echo "This is the root cause of 'Given final block not properly padded' during Gradle packageRelease." >&2
            echo "Fix: update ANDROID_RELEASE_KEYALIAS_PASSWD in GitHub secrets to the key entry password used when the keystore was created." >&2
            echo "Note: many Android keystores use the same password for both the store and the key entry." >&2
            cat /tmp/android-keypass-check.log >&2
            exit 1
          fi
          rm -f /tmp/android-signing-verify.p12

          echo "Android signing preflight passed for alias ${P4A_RELEASE_KEYALIAS} (store password and key entry password both verified)."

      - name: Build APK
        env:
          P4A_RELEASE_KEYSTORE: ${{ github.workspace }}/mobile/.ci/release.keystore
          P4A_RELEASE_KEYSTORE_PASSWD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWD }}
          P4A_RELEASE_KEYALIAS: ${{ secrets.ANDROID_RELEASE_KEYALIAS }}
          P4A_RELEASE_KEYALIAS_PASSWD: ${{ secrets.ANDROID_RELEASE_KEYALIAS_PASSWD }}
        run: |
          set -euo pipefail
          if [ -z "${P4A_RELEASE_KEYSTORE_PASSWD}" ] || [ -z "${P4A_RELEASE_KEYALIAS}" ] || [ -z "${P4A_RELEASE_KEYALIAS_PASSWD}" ]; then
            echo "Missing required Android signing secrets: ANDROID_RELEASE_KEYSTORE_PASSWD, ANDROID_RELEASE_KEYALIAS, ANDROID_RELEASE_KEYALIAS_PASSWD" >&2
            exit 1
          fi
          cd mobile
          ANDROID_NUMERIC_VERSION=$((100000000 + GITHUB_RUN_NUMBER))
          # Override build_dir for CI (no USB stick)
          sed -i 's|^build_dir.*|build_dir = /tmp/buildozer-build|' buildozer.spec
          sed -i 's|^android.release_artifact.*|android.release_artifact = apk|' buildozer.spec
          sed -i "s|^android.numeric_version.*|android.numeric_version = ${ANDROID_NUMERIC_VERSION}|" buildozer.spec

          # Two-phase build: the first attempt extracts and builds
          # hostpython3 properly, but numpy will fail because p4a sets
          # PYTHONNOUSERSITE=1 and overrides PYTHONPATH -- making the
          # system-installed Cython invisible.  After that first run
          # creates the real directory tree, we inject Cython into
          # hostpython3's site-packages and retry.
          buildozer android release 2>&1 || true

          HP_SITE="/tmp/buildozer-build/android/platform/build-arm64-v8a_armeabi-v7a/build/other_builds/hostpython3/desktop/hostpython3/native-build/Lib/site-packages"
          mkdir -p "$HP_SITE"
          pip install --target="$HP_SITE" Cython==0.29.36

          buildozer android release

      - name: Prepare APK artifact
        run: |
          mkdir -p artifacts
          APK_PATH=""
          for candidate in mobile/bin/*-release.apk mobile/bin/*.apk; do
            if [ -f "$candidate" ]; then
              APK_PATH="$candidate"
              break
            fi
          done
          if [ -z "$APK_PATH" ]; then
            echo "No APK build artifact found in mobile/bin" >&2
            exit 1
          fi
          cp "$APK_PATH" artifacts/momentum-android.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: momentum-android
          path: artifacts/momentum-android.apk

  release:
    needs: [build, build-apk]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Get version
        id: version
        run: echo "version=$(poetry version -s)" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-build.${{ github.run_number }}
          name: Momentum v${{ steps.version.outputs.version }} (build ${{ github.run_number }})
          body: |
            Automated build from commit ${{ github.sha }}.

            Download the binary for your platform and run it directly -- no Python required.

            - **Linux**: `momentum-linux` (standalone binary) or `momentum_<version>_amd64.deb` (Debian/Ubuntu package)
            - **macOS**: `momentum-macos`
            - **Windows**: `momentum-windows.exe`
            - **Android**: `momentum-android.apk`
          files: release-assets/*
          draft: false
          prerelease: false
